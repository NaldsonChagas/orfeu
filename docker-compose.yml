services:
  api:
    build:
      context: ./orfeu-api
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./orfeu-api/src:/app/src
    environment:
      - NODE_ENV=development

  web:
    build:
      context: ./orfeu-web
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./orfeu-web/src:/app/src
      - ./orfeu-web/public:/app/public
    environment:
      - NODE_ENV=development
    depends_on:
      - api
